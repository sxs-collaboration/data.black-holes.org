version: '3.1'

services:

  jupyter:
    build: build
    user: root
    restart: on-failure
    volumes:
      - /home/boyle/work:/home/jovyan/work
      - /sxs-annex/SimulationAnnex.git:/sxs-annex/SimulationAnnex.git
    environment:
      - NB_USER=boyle
      - NB_UID=1004
      - NB_GID=1006
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    command: ["start-notebook.sh", "--NotebookApp.base_url=/jupyter"]
