# See https://wiki.mozilla.org/Security/Guidelines/Web_Security for a good summary of
# features that should be implemented.

events {
        # nginx fails if this block is not present, even though it's empty...
}

http {

        # Don't show the nginx version number in error pages and Server header
        server_tokens off;

        # This section is necessary to set mime types automatically so that, for example,
        # a CSS file gets served as text/css instead of text/html.
        include /etc/nginx/mime.types;

        # Note that header directives are inherited from the previous level if and only if
        # there are no header directives defined on the current level.  So if any are
        # added again, these should usually be included again.
        include nginx-headers.conf;

        # This is where files are kept.  Note that files placed here are not automatically
        # served, unless specified below with something like `try_files`.  That is, there
        # is no default relationship between requested URLs and files stored in this
        # directory, as there would be more usually in Apache.
        root /usr/share/nginx/html;

        # When possible, send files efficiently.
        sendfile on;

        # Don't serve any files with symlinks anywhere in the path.  Note that uwsgi will follow
        # symlinks so that, e.g., we can store data in git annex.
        disable_symlinks on;

        # Move every http request over to https, to help ensure that nobody, submits a
        # password over http, for example.
        server {
                listen 80;
                listen [::]:80;
                server_name www.black-holes.org black-holes.org localhost;
                return 301 https://$host$request_uri;
        }

        # Move every request for black-holes.org to www.black-holes.org, for consistency.
        # This can simplify a lot of issues with cookies, for example, and could be useful
        # in the future if we add nontrivial subdomains.
        server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name black-holes.org;
                include nginx-ssl.conf;
                return 301 https://www.black-holes.org$request_uri;
        }

        # This is where all the work happens.
        server {

                listen 443 ssl http2 default_server;
                listen [::]:443 ssl http2 default_server;
                include nginx-ssl.conf;

                # Make sure files in the paths used to actually store files are never served by
                # nginx; they will be served by uwsgi.
                location /files/ { return 404; }
                location /storage/ { return 404; }

                # The most basic files we need to serve
                location = /favicon.ico { try_files /favicon.ico =404; }
                location = /robots.txt { try_files /robots.txt =404; }

                # Custom 404 page
                error_page 404 /default/404.html;
                location = /default/404.html {
                        allow all;
                        try_files /default/404.html =404;
                }

                # Return the string `healthy` if asked
                location = /health_check { return 200 healthy; }

                # # Let's Encrypt uses files in /.well-known/acme-challenge to verify a
                # # website is owned by the certbot making a request.  But we want to deny
                # # requests that just ask for this directory.
                # location = /.well-known/acme-challenge/ { return 404; }
	        # location ^~ /.well-known/acme-challenge {
                #         default_type "text/plain";
                #         root /usr/share/nginx/letsencrypt;
                # }

                # Deny the existence of any hidden files, such as .htaccess or .git, but
                # note that /.well-known needs to be accessible if letsencrypt is being
                # used, so that rule should come before this one.
                location ~ /\. { return 404; }

                # This is a basic stylesheet that's used across many of the data pages
                location = /css/bootstrap.min.css { try_files /css/bootstrap.min.css =404; }
                location = /css/bootstrap.min.css.map { try_files /css/bootstrap.min.css.map =404; }
                location = /css/cuscosky.css { try_files /css/cuscosky.css =404; }
                location = /css/file_listing.css { try_files /css/file_listing.css =404; }
                location = /js/file_listing.js { try_files /js/file_listing.js =404; }
                location = /js/mathjax.js { try_files /js/mathjax.js =404; }
                location = /js/jsgrid_helpers.js { try_files /js/jsgrid_helpers.js =404; }

                location ~ ^/images/[^/]+\.png$ {
                        try_files $uri =404;
                }

                location ~ ^/images/icons/([^/]+\.svg)$ {
                        try_files /images/font_awesome_icons/$1 =404;
                }

                # Permanently redirect any old pages
                location = /waveforms/catalog.php {
                        return 301 https://$host/waveforms/catalog.html;
                }
                location = /waveforms/docs.html {
                        return 301 https://$host/waveforms/documentation.html;
                }
                location = /waveforms/simulation-bibtex-keys.bib {
                        return 301 https://$host/waveforms/references.bib;
                }
                location = /surrogates/GWSurrogate_example.html {
                        try_files /surrogates/GWSurrogate_example.html =404;
                }

                # # Using `index` doesn't work in these cases, so we add catalogs here as well as in
                # # the next block.
                # location ~ ^/(?<catalog_name>waveforms|surrogates)/?$ {
                #         return 301 https://$host/$catalog_name/index.html;
                # }

                location ~ ^/(?<catalog_name>waveforms|surrogates)/ {
                        # Note: When a parent location is a regex, nested locations must be too.
                        # However, no location can use variables, so we can't just refer back to
                        # $catalog_name; instead we'll just match `^/[^/.]+/` to ensure that there's
                        # no funny business with the path.

                        # Files for the index
                        location ~ ^/[^/.]+/index.html$ {
                                try_files /$catalog_name/index.html /default/index.html =404;
                        }
                        location ~ ^/[^/.]+/index.json$ {
                                try_files /$catalog_name/index.json =404;
                        }
                        location ~ ^/[^/.]+/documentation.html$ {
                                try_files /$catalog_name/documentation.html =404;
                        }
                        location ~ ^/[^/.]+/news.html$ {
                                try_files /$catalog_name/news.html =404;
                        }

                        # Serve bibtex files
                        location ~ ^/[^/.]+/references.bib$ {
                                try_files /$catalog_name/references.bib =404;
                        }

                        # Files for the catalog
                        location ~ ^/[^/.]+/catalog.html$ {
                                try_files /default/catalog.html =404;
                        }
                        location ~ ^/[^/.]+/catalog.json$ {
                                try_files /$catalog_name/catalog.json =404;
                        }
                        location ~ ^/[^/.]+/data.json$ {
                                try_files /$catalog_name/data.json =404;
                        }

                        # List files in any data group of the catalog
                        location ~ ^/[^/.]+/data/[^/.]+\.json$ {
                                try_files $uri =404;
                        }
                        location ~ ^/[^/.]+/data/ {
                                if ($arg_error) {
                                        return 404;
                                }
                                try_files /default/data.html =404;
                        }

                        # Handle downloads by passing off to the uwsgi container.
                        location ~ ^/[^/.]+/download$ {
                                if ($arg_error) {
                                        return 404;
                                }
                                include uwsgi_params;
                                uwsgi_pass uwsgi://uwsgi:8080;
                        }

                        # If all else fails
                        error_page 404 /default/404.html;
                        return 404;
                }

                # If all else fails, return 404 to make sure we don't serve unintended files.
                location / {
                        error_page 404 /default/404.html;
                        return 404;
                }

	}

}
