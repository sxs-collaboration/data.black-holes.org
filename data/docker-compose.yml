version: '3'

# networks:
#   default:
#     external:
#       name: www_default

services:
  nginx2:
    image: nginx
    # ports:
    #   - 7080:80
    #   - 7443:443
    depends_on:
      - uwsgi
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../www/nginx/nginx-headers.conf:/etc/nginx/nginx-headers.conf:ro
      - ../www/nginx/nginx-ssl.conf:/etc/nginx/nginx-ssl.conf:ro
      - ../www/nginx/dhparam.pem:/etc/ssl/certs/dhparam.pem:ro
      - ../letsencrypt/black-holes.org:/etc/ssl/private:ro
      #- /etc/letsencrypt/live/black-holes.org:/etc/ssl/private:ro
      - ./document_root:/usr/share/nginx/html:ro
    # # If you need to debug nginx's inner workings, uncomment the
    # # following command and set this in nginx.conf:
    # #   error_log /var/log/nginx/error.log debug;
    # # The logs can be viewed with the bash command
    # #   docker-compose logs nginx
    # command: ["nginx-debug", "-g", "daemon off;"]

  uwsgi:
    build: uwsgi/build
    environment:
      - GOOGLE_RECAPTCHA_SECRET=6Le3Ah4UAAAAADStZwhsviymeinCXfMbcuJnPCtV
    volumes:
      - ./document_root:/var/www/html
      - ./uwsgi/wsgi.ini:/var/www/wsgi.ini
      - ./uwsgi/download.py:/var/www/download.py
      # - /Users/boyle/Research/Data/SimulationAnnex:/var/www/html/waveforms/storage:ro
      - /sxs-annex/SimulationAnnex.git:/var/www/html/waveforms/SimulationAnnex.git:ro
      - /web/servers/data/waveforms/CatalogLinks:/var/www/html/waveforms/files:ro
      # - /sxs-annex/SimulationAnnex.git/Catalog:/var/www/html/waveforms/storage/Catalog:ro
      # - /web/servers/data/waveforms/CatalogLinks:/var/www/html/waveforms/storage/CatalogLinks:ro
      #- /home/boyle/SimulationAnnex.git/CatalogLinks:/var/www/html/waveforms/storage/CatalogLinks:ro
      - /home/git/repositories/SurrogateModeling.git:/var/www/html/surrogates/storage:ro
