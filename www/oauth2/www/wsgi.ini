[uwsgi]
module = app:app
socket = :8080
uid = www-data
gid = www-data
master = true
processes = 5
vacuum = true
thunder-lock = true
die-on-term = true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
close-on-exec = true
lazy-apps = true
touch-chain-reload = /var/www/app.py