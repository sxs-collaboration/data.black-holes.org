# See <https://www.ssllabs.com/ssltest/analyze.html?d=black-holes.org&latest> to test how well we do
# on this.  Note that we want to do very well, but not necessarily 100% on everything.  If we were a
# bank, we might go for that, but we need to be usable for people with slightly older systems, so
# we'll settle for the happy medium.  We'll follow Mozilla's advice: "Websites intended for general
# public consumption should use the Mozilla intermediate TLS configuration."
# <https://wiki.mozilla.org/Security/Server_Side_TLS#Intermediate_compatibility_.28default.29>
# <https://ssl-config.mozilla.org/#server=nginx&version=1.15.5&config=intermediate&openssl=1.1.0j&guideline=5.4>

ssl_certificate /etc/ssl/private/live/black-holes.org/fullchain.pem;
ssl_certificate_key /etc/ssl/private/live/black-holes.org/privkey.pem;
ssl_trusted_certificate /etc/ssl/private/live/black-holes.org/chain.pem;
ssl_dhparam /etc/ssl/certs/dhparam.pem;

ssl_session_timeout 1d;
ssl_session_cache shared:MozSSL:10m;
ssl_session_tickets off;

ssl_protocols TLSv1.2;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;

# See conf.d/headers.conf for the Strict-Transport-Security header

ssl_stapling on;
ssl_stapling_verify on;

resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# # Make sure the connection stays in https by "pinning"
# Beware that pinning is dangerous:
#   https://www.smashingmagazine.com/be-afraid-of-public-key-pinning/
# In fact, it's not even recommended by Mozilla:
#   https://wiki.mozilla.org/Security/Guidelines/Web_Security#HTTP_Public_Key_Pinning
# Also note that `add_header` directives "are inherited from the
# previous level if and only if there are no `add_header` directives
# defined on the current level."  So if any others were previously
# defined, they should be added again.
# # # add_header Public-Key-Pins 'pin-sha256=""; pin-sha256=""; max-age=86400';
