# Using `index` doesn't work in these cases, so we add catalogs here as well as in
# the next block.
location ~ ^/waveforms/?$ {
    return 301 https://$host/waveforms/index.html;
}

# File for the Ext-CCE catalog
location = /waveforms/extcce_catalog.html {
    error_page 404 /default/404.html;
    try_files /waveforms/extcce_catalog.html =404;
}

location ~ ^/waveforms/ {

    gzip on;
    gzip_types *;

    # Note: When a parent location is a regex, nested locations must be too.  However, no
    # location can use variables, so we can't just refer back to $catalog_name; instead we'll
    # just match `^/[^/.]+/` to ensure that there's no funny business with the path.

    # Files for the index
    location ~ ^/[^/.]+/index.html$ {
        error_page 404 /default/404.html;
        try_files /waveforms/index.html /default/index.html =404;
    }
    location ~ ^/[^/.]+/index.json$ {
        error_page 404 /default/404.html;
        try_files /waveforms/index.json =404;
    }
    location ~ ^/[^/.]+/documentation.html$ {
        error_page 404 /default/404.html;
        try_files /waveforms/documentation.html =404;
    }
    location ~ ^/[^/.]+/news.html$ {
        error_page 404 /default/404.html;
        try_files /waveforms/news.html =404;
    }

    # Serve bibtex files
    location ~ ^/[^/.]+/references.bib$ {
        error_page 404 /default/404.html;
        try_files /waveforms/references.bib =404;
    }

    # Files for the catalog
    location ~ ^/[^/.]+/catalog.html$ {
        error_page 404 /default/404.html;
        try_files /default/catalog.html =404;
    }
    location ~ ^/[^/.]+/catalog2.html$ {
        error_page 404 /default/404.html;
        try_files /default/catalog2.html =404;
    }
    location ~ ^/[^/.]+/catalog.json$ {
        rewrite ^ /public_catalog.json last;
        # error_page 404 /default/404.html;
        # try_files /waveforms/catalog.json =404;
    }
    location ~ ^/[^/.]+/catalog_info.json$ {
        error_page 404 /default/404.html;
        try_files /waveforms/catalog_info.json =404;
    }

    # List files in any data group of the catalog
    location ~ ^/[^/.]+/data/[^/.]+\.json$ {
        error_page 404 /default/404.html;
        try_files $uri =404;
    }
    # Translate SXS IDs into Zenodo concept URLs
    location ~ ^/[^/.]+/data/(?<sxs_id>SXS:(BBH|BHNS|NSNS):[0-9]+)$ {
        return 301 https://zenodo.org/record/$zenodo_identifier;
        # return 301 https://doi.org/10.5281/zenodo.$zenodo_identifier;
    }
    location ~ ^/[^/.]+/data/(?<sxs_id>SXS:(BBH|BHNS|NSNS):[0-9]+)/(?<suffix>.+) {
        return 301 https://zenodo.org/record/$zenodo_identifier/$suffix;
    }
    location ~ ^/[^/.]+/data/ {
        error_page 404 /default/404.html;
        if ($arg_error) {
            return 404;
        }
        try_files /default/data.html =404;
    }

    # Handle downloads by passing off to the uwsgi container.
    location ~ ^/[^/.]+/download$ {
        error_page 500 502 503 504 /default/504.html;
        error_page 404 /default/404.html;
        if ($arg_error) {
            return 404;
        }
        include uwsgi_params;
        uwsgi_pass uwsgi://uwsgi:8080;

        ## A long timeout should no longer be necessary, since the code that's called
        ## should now start its response immediately and stream, rather than wait for
        ## the tar process to complete.
        # uwsgi_read_timeout 300s;
        uwsgi_read_timeout 30s;
    }

    # If all else fails
    error_page 404 /default/404.html;
    return 404;
}


# If all else fails, return 404 to make sure we don't serve unintended files.
location / {
    try_files /default/404.html =404;
}
