# This is where files are kept.  Note that docker makes this directory appear in the container, but
# on the server it is located in /web/servers/data/document_root.
root /usr/share/nginx/html/data;

# Automatically set the appropriate MIME type for any files we send from nginx
include /etc/nginx/mime.types;
types {
    application/x-hdf5  h5 hdf5;
}

