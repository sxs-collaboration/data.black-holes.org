# Make sure files in the paths used to actually store files are never served by nginx; they will be
# served by uwsgi, with more checks about whether or not they actually should be served.
location /files/ {
    error_page 404 /default/404.html;
    return 404;
}
location /storage/ {
    error_page 404 /default/404.html;
    return 404;
}

# Allow uwsgi to return with an X-Accel-Redirect header for direct download of the file
location /direct_download/surrogates/files/ {
    internal;
    alias /usr/share/nginx/html/surrogate_data/data/;
}
location /direct_download/ {
    internal;
    alias /usr/share/nginx/html/data/;
}

location /catalog.json {
    rewrite ^(.*)/catalog.json $1/public_catalog.json last;
}

location /simulations.json {
    rewrite ^(.*)/simulations.json $1/public_simulations.json last;
}

location /public_catalog.json {
    gzip on;
    gzip_types application/json;
    gzip_comp_level 6;
    error_page 404 /default/404.html;
    try_files $uri =404;
}

location /public_simulations.json {
    gzip on;
    gzip_types application/json;
    gzip_comp_level 6;
    error_page 404 /default/404.html;
    try_files $uri =404;
}

# These are basic stylesheets and scripts that are used across many of the data pages
location = /css/bootstrap.min.css { try_files /css/bootstrap.min.css =404; }
location = /css/bootstrap.min.css.map { try_files /css/bootstrap.min.css.map =404; }
location = /css/cuscosky.css { try_files /css/cuscosky.css =404; }
location = /css/file_listing.css { try_files /css/file_listing.css =404; }
location = /js/file_listing.js { try_files /js/file_listing.js =404; }
location = /js/mathjax.js { try_files /js/mathjax.js =404; }
location = /js/jsgrid_helpers.js { try_files /js/jsgrid_helpers.js =404; }

location ~ ^/images/[^/]+\.png$ {
    error_page 404 /default/404.html;
    try_files $uri =404;
}

location ~ ^/images/icons/([^/]+\.svg)$ {
    error_page 404 /default/404.html;
    try_files /images/font_awesome_icons/$1 =404;
}

# Permanently redirect any old pages
location = / {
    return 301 https://$host/waveforms/index.html;
}
location = /waveforms/docs.html {
    return 301 https://$host/waveforms/documentation.html;
}
location = /waveforms/simulation-bibtex-keys.bib {
    return 301 https://$host/waveforms/references.bib;
}

# Rather than trying to serve index.html (which doesn't exist) from zenodo itself via the next block, just redirect
location = /surrogates/index.html {
    return 301 https://doi.org/10.5281/zenodo.1215752;
}
# This location and the next just proxy requests for these files through zenodo.  Additional
# fanciness is needed to ensure that the files are actually served as they should be, and display as
# jupyter notebooks; zenodo fouls this up, which is why we don't just use redirects.
location ~ /surrogates/([^/]+).html {
    # We use the "concept" id here, so that it always points to the current recid.  The proxy
    # call in this block will return a 302 to https://data.black-holes.org/record/<recid>/...
    # This will then be passed to the next block, which will send the corrected call.
    proxy_method GET;
    proxy_pass_request_body off;
    proxy_pass_request_headers off;
    rewrite ^ /record/1215752 break;  # Just send every request to the concept URL, and add the file back in later
    recursive_error_pages on;  # In case the next call 404s
    error_page 404 /default/404.html;  # In case this call 404s
    error_page 301 302 307 = @handle_zenodo_redirect;  # Catch any redirect-y return status
    proxy_intercept_errors on;  # Intercept those redirects, particularly
    proxy_set_header Host "zenodo.org";  # Set this header in the request sent to zenodo
    proxy_pass https://zenodo.org;  # Pass the request (including rewritten part) to zenodo
}
location @handle_zenodo_redirect {
    access_log /var/log/nginx/proxy_logging.log combined_redirect;
    error_page 404 /default/404.html;  # Send our nice-looking 404 page, if necessary
    set $saved_redirect_location '${upstream_http_location}/files/${request_basename}?download=1';  # Current download URL of requested file
    return 302 '$saved_redirect_location';
}
location ~ ^/surrogates/ {
     return 301 https://doi.org/10.5281/zenodo.1215752;
}

# TEMPORARILY (always) redirect requests for SXS IDs to our DOI
location ~ ^/SXS:(.*) {
     return 302 https://doi.org/10.26138/SXS:$1;
}
