# !!! NOTE !!!
# Because the Server Name Indication part of TLS negotiation is done *after* the connection has been
# negotiated, having separate configurations for differently named servers on the same IP address
# doesn't really work, strictly speaking.  Essentially, the default server has to use the lowest
# common denominator so that the server that actually uses that configuration will work.  However,
# there are some items that might benefit from stricter configuration, so it still helps to use the
# stricter configuration.


# See <https://www.ssllabs.com/ssltest/analyze.html?d=black-holes.org&latest> to test how well we do
# on this.  
# <https://wiki.mozilla.org/Security/Server_Side_TLS#Modern_compatibility>
# <https://mozilla.github.io/server-side-tls/ssl-config-generator/?server=nginx-1.10.1&openssl=1.1.0f&hsts=yes&profile=modern>

ssl_certificate /etc/ssl/private/live/black-holes.org/fullchain.pem;
ssl_certificate_key /etc/ssl/private/live/black-holes.org/privkey.pem;
ssl_trusted_certificate /etc/ssl/private/live/black-holes.org/chain.pem;

ssl_session_timeout 1d;
ssl_session_cache shared:SSL:50m;
ssl_session_tickets off;

ssl_protocols TLSv1.2;
ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256';
ssl_prefer_server_ciphers on;

# See conf.d/headers.conf for the Strict-Transport-Security header

ssl_stapling on;
ssl_stapling_verify on;

resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# # Make sure the connection stays in https by "pinning"
# Beware that pinning is dangerous:
#   https://www.smashingmagazine.com/be-afraid-of-public-key-pinning/
# In fact, it's not even recommended by Mozilla:
#   https://wiki.mozilla.org/Security/Guidelines/Web_Security#HTTP_Public_Key_Pinning
# Also note that `add_header` directives "are inherited from the
# previous level if and only if there are no `add_header` directives
# defined on the current level."  So if any others were previously
# defined, they should be added again.
# # # add_header Public-Key-Pins 'pin-sha256=""; pin-sha256=""; max-age=86400';
