events {
        # nginx fails if this block is not present, even though it's empty...
}

http {

        # Don't show the nginx version number in error pages and Server header
        server_tokens off;

        # This section is necessary to set mime types automatically so that, for example,
        # a CSS file gets served as text/css instead of text/html.
        include /etc/nginx/mime.types;

        # This will be used to limit requests for locations with this `limit_req zone` to
        # 10 requests per minute.  This uses a 10MB in-memory zone to remember requests.
        limit_req_zone $binary_remote_addr zone=limit_logins:10m rate=10r/m;

        # This is where files are kept.  Note that if this directive is given, files placed here are
        # automatically served unless overriden with a matching location.  Even though we have a
        # `location /` block below, it is still possible to have an unmatched location (because of
        # nesting).  So it is better not to use this.
        root /usr/share/nginx/html;

        # Add the scheme and host to the default log, since we've got more than one server's logs
        # being sent to the same log file (which we do because we want docker to handle them).
        log_format extended '$remote_addr - $remote_user [$time_local]  '
                            '"$request_method $scheme://$host$request_uri $server_protocol" $status $body_bytes_sent '
                            '"$http_referer" "$http_user_agent"';
        access_log /var/log/nginx/access.log extended;
        error_log /var/log/nginx/error.log debug;

        # Server for subdomain wiki.black-holes.org
        map $scheme $php_https { default off; https on; }
        map $cookie_session $has_session_cookie { default ""; "~." "true"; }
	server {
                listen 80 default_server;  # Default for this port
                listen [::]:80 default_server;
                server_name _;  # Wildcard; anything at all on port 80

                root /var/www/html/wiki;
                index doku.php;

                keepalive_requests    10;
                keepalive_timeout     60 60;

                include conf.d/oauth2.conf;

                location / {
                        auth_request /auth/check;
                        error_page 403 = /auth/login;

                        auth_request_set $auth_cookie $upstream_http_set_cookie;
                        auth_request_set $user        $upstream_http_x_auth_request_user;
                        auth_request_set $name        $upstream_http_x_auth_request_name;
                        auth_request_set $email       $upstream_http_x_auth_request_email;
                        auth_request_set $groups      $upstream_http_x_auth_request_groups;
                        auth_request_set $failure     $upstream_http_x_auth_failure;
                        add_header X-Auth-Failure     $failure;
                        proxy_set_header X-User $user;
                        proxy_set_header X-Memberships $groups;
                        proxy_set_header X-Name $name;
                        proxy_set_header X-Email $email;
                        proxy_pass http://responder:8080;
                        # default_type text/html;
                        # return 200 '<!doctype html><html lang="en"><head><meta charset="utf-8"><link rel="icon" href="data:;base64,iVBORw0KGgo="></head><body>auth checked</body></html>';
                }
	}
}
