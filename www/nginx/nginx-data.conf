# Make sure files in the paths used to actually store files are never served by nginx; they will be
# served by uwsgi, with more checks about whether or not they actually should be served.
location /data/files/ {
        error_page 404 /data/default/404.html;
        return 404;
}
location /data/storage/ {
        error_page 404 /data/default/404.html;
        return 404;
}

# These are basic stylesheets and scripts that are used across many of the data pages
location = /data/css/bootstrap.min.css { try_files /data/css/bootstrap.min.css =404; }
location = /data/css/bootstrap.min.css.map { try_files /data/css/bootstrap.min.css.map =404; }
location = /data/css/cuscosky.css { try_files /data/css/cuscosky.css =404; }
location = /data/css/file_listing.css { try_files /data/css/file_listing.css =404; }
location = /data/js/file_listing.js { try_files /data/js/file_listing.js =404; }
location = /data/js/mathjax.js { try_files /data/js/mathjax.js =404; }
location = /data/js/jsgrid_helpers.js { try_files /data/js/jsgrid_helpers.js =404; }

location ~ ^/data/images/[^/]+\.png$ {
        error_page 404 /data/default/404.html;
        try_files $uri =404;
}

location ~ ^/data/images/icons/([^/]+\.svg)$ {
        error_page 404 /data/default/404.html;
        try_files /data/images/font_awesome_icons/$1 =404;
}

# Permanently redirect any old pages
location = /data/waveforms/catalog.php {
        return 301 https://$host/data/waveforms/catalog.html;
}
location = /data/waveforms/docs.html {
        return 301 https://$host/data/waveforms/documentation.html;
}
location = /data/waveforms/simulation-bibtex-keys.bib {
        return 301 https://$host/data/waveforms/references.bib;
}
location = /data/surrogates/GWSurrogate_example.html {
        error_page 404 /data/default/404.html;
        try_files /data/surrogates/GWSurrogate_example.html =404;
}
location = /data/surrogates/NRSur4d2s_tutorial.html {
        error_page 404 /data/default/404.html;
        try_files /data/surrogates/NRSur4d2s_tutorial.html =404;
}
location = /data/surrogates/NRSur7dq2_tutorial.html {
        error_page 404 /data/default/404.html;
        try_files /data/surrogates/NRSur7dq2_tutorial.html =404;
}

# Using `index` doesn't work in these cases, so we add catalogs here as well as in
# the next block.
location ~ ^/data/(?<catalog_name>waveforms|surrogates)/?$ {
        return 301 https://$host/data/$catalog_name/index.html;
}

location ~ ^/data/(?<catalog_name>waveforms|surrogates)/ {

        gzip on;
        gzip_types *;
        
        

        # Note: When a parent location is a regex, nested locations must be too.  However, no
        # location can use variables, so we can't just refer back to $catalog_name; instead we'll
        # just match `^/data/[^/.]+/` to ensure that there's no funny business with the path.

        # Files for the index
        location ~ ^/data/[^/.]+/index.html$ {
                error_page 404 /data/default/404.html;
                try_files /data/$catalog_name/index.html /data/default/index.html =404;
        }
        location ~ ^/data/[^/.]+/index.json$ {
                error_page 404 /data/default/404.html;
                try_files /data/$catalog_name/index.json =404;
        }
        location ~ ^/data/[^/.]+/documentation.html$ {
                error_page 404 /data/default/404.html;
                try_files /data/$catalog_name/documentation.html =404;
        }
        location ~ ^/data/[^/.]+/news.html$ {
                error_page 404 /data/default/404.html;
                try_files /data/$catalog_name/news.html =404;
        }

        # Serve bibtex files
        location ~ ^/data/[^/.]+/references.bib$ {
                error_page 404 /data/default/404.html;
                try_files /data/$catalog_name/references.bib =404;
        }

        # Files for the catalog
        location ~ ^/data/[^/.]+/catalog.html$ {
                error_page 404 /data/default/404.html;
                try_files /data/default/catalog.html =404;
        }
        location ~ ^/data/[^/.]+/catalog.json$ {
                error_page 404 /data/default/404.html;
                try_files /data/$catalog_name/catalog.json =404;
        }
        location ~ ^/data/[^/.]+/catalog_info.json$ {
                error_page 404 /data/default/404.html;
                try_files /data/$catalog_name/catalog_info.json =404;
        }
        location ~ ^/data/[^/.]+/data.json$ {
                error_page 404 /data/default/404.html;
                try_files /data/$catalog_name/data.json =404;
        }

        # List files in any data group of the catalog
        location ~ ^/data/[^/.]+/data/[^/.]+\.json$ {
                error_page 404 /data/default/404.html;
                try_files $uri =404;
        }
        location ~ ^/data/[^/.]+/data/ {
                error_page 404 /data/default/404.html;
                if ($arg_error) {
                        return 404;
                }
                try_files /data/default/data.html =404;
        }

        # Handle downloads by passing off to the uwsgi container.
        location ~ ^/data/[^/.]+/download$ {
                error_page 500 502 503 504 /data/default/504.html;
                error_page 404 /data/default/404.html;
                if ($arg_error) {
                        return 404;
                }
                include uwsgi_params;
                uwsgi_pass uwsgi://uwsgi:8080;

                ## A long timeout should no longer be necessary, since the code that's called
                ## should now start its response immediately and stream, rather than wait for
                ## the tar process to complete.
                # uwsgi_read_timeout 300s;
                uwsgi_read_timeout 30s;
        }

        # If all else fails
        error_page 404 /data/default/404.html;
        return 404;
}


# If all else fails, return 404 to make sure we don't serve unintended files.
location /data {
        try_files /data/default/404.html =404;
}
