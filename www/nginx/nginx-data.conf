# Make sure files in the paths used to actually store files are never served by nginx; they will be
# served by uwsgi, with more checks about whether or not they actually should be served.
location /files/ {
        error_page 404 /default/404.html;
        return 404;
}
location /storage/ {
        error_page 404 /default/404.html;
        return 404;
}

# These are basic stylesheets and scripts that are used across many of the data pages
location = /css/bootstrap.min.css { try_files /css/bootstrap.min.css =404; }
location = /css/bootstrap.min.css.map { try_files /css/bootstrap.min.css.map =404; }
location = /css/cuscosky.css { try_files /css/cuscosky.css =404; }
location = /css/file_listing.css { try_files /css/file_listing.css =404; }
location = /js/file_listing.js { try_files /js/file_listing.js =404; }
location = /js/mathjax.js { try_files /js/mathjax.js =404; }
location = /js/jsgrid_helpers.js { try_files /js/jsgrid_helpers.js =404; }

location ~ ^/images/[^/]+\.png$ {
        error_page 404 /default/404.html;
        try_files $uri =404;
}

location ~ ^/images/icons/([^/]+\.svg)$ {
        error_page 404 /default/404.html;
        try_files /images/font_awesome_icons/$1 =404;
}

# Permanently redirect any old pages
location = /waveforms/catalog.php {
        return 301 https://$host/waveforms/catalog.html;
}
location = /waveforms/docs.html {
        return 301 https://$host/waveforms/documentation.html;
}
location = /waveforms/simulation-bibtex-keys.bib {
        return 301 https://$host/waveforms/references.bib;
}
location = /surrogates/GWSurrogate_example.html {
        error_page 404 /default/404.html;
        try_files /surrogates/GWSurrogate_example.html =404;
}
location = /surrogates/NRSur4d2s_tutorial.html {
        error_page 404 /default/404.html;
        try_files /surrogates/NRSur4d2s_tutorial.html =404;
}
location = /surrogates/NRSur7dq2_tutorial.html {
        error_page 404 /default/404.html;
        try_files /surrogates/NRSur7dq2_tutorial.html =404;
}

# Using `index` doesn't work in these cases, so we add catalogs here as well as in
# the next block.
location ~ ^/(?<catalog_name>waveforms|surrogates)/?$ {
        return 301 https://$host/$catalog_name/index.html;
}

location ~ ^/(?<catalog_name>waveforms|surrogates)/ {

        gzip on;
        gzip_types *;
        
        

        # Note: When a parent location is a regex, nested locations must be too.  However, no
        # location can use variables, so we can't just refer back to $catalog_name; instead we'll
        # just match `^/[^/.]+/` to ensure that there's no funny business with the path.

        # Files for the index
        location ~ ^/[^/.]+/index.html$ {
                error_page 404 /default/404.html;
                try_files /$catalog_name/index.html /default/index.html =404;
        }
        location ~ ^/[^/.]+/index.json$ {
                error_page 404 /default/404.html;
                try_files /$catalog_name/index.json =404;
        }
        location ~ ^/[^/.]+/documentation.html$ {
                error_page 404 /default/404.html;
                try_files /$catalog_name/documentation.html =404;
        }
        location ~ ^/[^/.]+/news.html$ {
                error_page 404 /default/404.html;
                try_files /$catalog_name/news.html =404;
        }

        # Serve bibtex files
        location ~ ^/[^/.]+/references.bib$ {
                error_page 404 /default/404.html;
                try_files /$catalog_name/references.bib =404;
        }

        # Files for the catalog
        location ~ ^/[^/.]+/catalog.html$ {
                error_page 404 /default/404.html;
                try_files /default/catalog.html =404;
        }
        location ~ ^/[^/.]+/catalog.json$ {
                error_page 404 /default/404.html;
                try_files /$catalog_name/catalog.json =404;
        }
        location ~ ^/[^/.]+/catalog_info.json$ {
                error_page 404 /default/404.html;
                try_files /$catalog_name/catalog_info.json =404;
        }
        location ~ ^/[^/.]+/data.json$ {
                error_page 404 /default/404.html;
                try_files /$catalog_name/data.json =404;
        }

        # List files in any data group of the catalog
        location ~ ^/[^/.]+/data/[^/.]+\.json$ {
                error_page 404 /default/404.html;
                try_files $uri =404;
        }
        location ~ ^/[^/.]+/data/ {
                error_page 404 /default/404.html;
                if ($arg_error) {
                        return 404;
                }
                try_files /default/data.html =404;
        }

        # Handle downloads by passing off to the uwsgi container.
        location ~ ^/[^/.]+/download$ {
                error_page 500 502 503 504 /default/504.html;
                error_page 404 /default/404.html;
                if ($arg_error) {
                        return 404;
                }
                include uwsgi_params;
                uwsgi_pass uwsgi://uwsgi:8080;

                ## A long timeout should no longer be necessary, since the code that's called
                ## should now start its response immediately and stream, rather than wait for
                ## the tar process to complete.
                # uwsgi_read_timeout 300s;
                uwsgi_read_timeout 30s;
        }

        # If all else fails
        error_page 404 /default/404.html;
        return 404;
}


# If all else fails, return 404 to make sure we don't serve unintended files.
location / {
        try_files /default/404.html =404;
}
