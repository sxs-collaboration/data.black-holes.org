# This is the key file that tells `nginx` how to handle requests to our web server.  The
# brief outline is:
#   * All requests on port 80 (http) just return a permanent redirect (301) to port 443
#     (https).  Any decent browser will seamlessly resend the request to 443.
#   * Requests on port 443 for `black-holes.org` return a permanent redirect (301) to
#     `www.black-holes.org`.  Again, this should be seamless for the user.
#   * Requests for `www.black-holes.org` on port 443 are then handled in numerous ways, as
#     shown below.
#
# To find how a given request is handled, look for the corresponding `location` block.
# (But note that several files are `include`d, and may have their own `location` blocks.)
# These can have various formats, starting with exact matches:
#   * location = /favicon.ico
#       Matches exactly https://www.black-holes.org/favicon.ico, but nothing else
# If an exact match is found, it is used immediately.  If no exact match is found, nginx
# looks for prefix matches -- URIs starting with the given location:
#   * location /code
#       Matches anything beginning with https://www.black-holes.org/code
#   * location ^~ /node
#       Matches anything beginning with https://www.black-holes.org/node
# The longest matching prefix is selected.  If it had the `^~` modifier, this is
# immediately served; if not nginx looks for regex matches:
#   * location ~ /\.
#       Case-sensitive regex; matches anything containing "/." (hidden files)
#   * location ~* baidu
#       Case-insensitive regex; matches anything containing "baidu", "BaIdU", ...
# If *any* regex match is found, it is immediately used; the search stops there.  If not,
# the best prefix match is used.  Note that `location /` is the default location, so it
# should always be set to something sensible. There is also a special type of location
# like
#    location @joomla
# This will never match a URL, but can be used for internal redirects if a line like
#    error_page 420 = @joomla;
# is also included.  Then, any `return 420` line will go to the `location @joomla` block.
# (Even though it feels hackish, this is actually the official way nginx recommends you
# do such things.)
#
# Most locations in this file will respond to a location match with one of the following:
#   * Redirect: Sent back to the browser; the browser will typically go straight to the
#     URL sent with the redirect, with no need for user input.
#   * Rewrite: Changes the URI that nginx is looking for, then returns whatever page
#     matches the rewritten URI as if the browser had requested it, but never bothers
#     telling the browser about that change.
#   * Try file: If the file exists, just return it.
#   * Proxy pass: pass the request along to another container.  That container then
#     returns some page to nginx, and nginx returns it to the user.  Nginx can modify
#     either the request or the response -- for example, by adding or removing headers.
#     These proxied requests go to different docker containers.


# See https://wiki.mozilla.org/Security/Guidelines/Web_Security for a good summary of
# features that should be implemented.

events {
        # nginx fails if this block is not present, even though it's empty...
}

http {

        # Don't show the nginx version number in error pages and Server header
        server_tokens off;

        # This section is necessary to set mime types automatically so that, for example,
        # a CSS file gets served as text/css instead of text/html.
        include /etc/nginx/mime.types;

        # This will be used to limit requests for locations with this `limit_req zone` to
        # 10 requests per minute.  This uses a 10MB in-memory zone to remember requests.
        limit_req_zone $binary_remote_addr zone=limit_logins:10m rate=10r/m;

        # This is where files are kept.  Note that files placed here are not automatically
        # served, unless specified below with something like `try_files`.  That is, there
        # is no default relationship between requested URLs and files stored in this
        # directory, as there would be more usually in Apache.
        root /usr/share/nginx/html;

        # NOTE: At the moment, joomla is sending the Cache-Control header, and I can't
        # seem to ignore this, so I'll comment this out for now.
        # # # Set up some space for the joomla cache metadata
        # # proxy_cache_path /usr/share/nginx/cache keys_zone=joomlacache:10m;

        # Move every http request over to https, to help ensure that nobody submits a password over
        # http, for example.  Carve out an exception for acme challenges, so that we can get and
        # renew SSL certificates with certbot.
        server {
                listen 80 default_server;
                listen [::]:80 default_server;
                #server_name www.black-holes.org black-holes.org *.black-holes.org localhost;
                server_name _;

                location /.well-known/acme-challenge/ {
                        root /var/www/letsencrypt;
                }

		# Refuse connections from misbehaving people and robots
		include nginx-block-hackers.conf;
		include nginx-block-robots.conf;

                # Case-sensitive http user-agent blocking
                if ($http_user_agent ~* (baidu|ahrefs) ) {
                        return 403;
                }

                location / {
		        if ($host = "black-holes.org") {
                                return 301 https://www.$host$request_uri;
			}
                        if ($host ~* ^(www\.|data\.) ) {
                                return 301 https://$host$request_uri;
			}
                        return 301 https://www.black-holes.org$request_uri;
                }
        }

        # Move every request for black-holes.org to www.black-holes.org, for consistency.
        # This can simplify a lot of issues with cookies, for example, and could be useful
        # in the future if we add nontrivial subdomains.
        server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name black-holes.org;
                include nginx-ssl.conf;
		ssl_certificate /etc/ssl/private/live/black-holes.org/fullchain.pem;
		ssl_certificate_key /etc/ssl/private/live/black-holes.org/privkey.pem;
		ssl_trusted_certificate /etc/ssl/private/live/black-holes.org/chain.pem;
                include nginx-headers.conf;

		# Refuse connections from misbehaving people and robots
		include nginx-block-hackers.conf;
		include nginx-block-robots.conf;

                # Case-sensitive http user-agent blocking
                if ($http_user_agent ~* (baidu|ahrefs) ) {
                        return 403;
                }

                return 301 https://www.black-holes.org$request_uri;
        }

        # This is where all the work happens.
        server {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name www.black-holes.org localhost;

		# Define where our SSL certificates are, and set various details of the
		# protocols we use.  See
		# <https://www.ssllabs.com/ssltest/analyze.html?d=black-holes.org&latest>
		# to test how well we do on this.  Note that we want to do very well, but
		# not necessarily 100% on everything.  If we were a bank, we might go for
		# that, but we need to be usable for people with slightly older systems,
		# so we'll settle for the happy medium.  We'll follow Mozilla's advice:
		# "Websites intended for general public consumption should use the Mozilla
		# intermediate TLS configuration."
		# <https://wiki.mozilla.org/Security/Server_Side_TLS#Intermediate_compatibility_.28default.29>
                include nginx-ssl.conf;
		ssl_certificate /etc/ssl/private/live/black-holes.org/fullchain.pem;
		ssl_certificate_key /etc/ssl/private/live/black-holes.org/privkey.pem;
		ssl_trusted_certificate /etc/ssl/private/live/black-holes.org/chain.pem;

                # Note that header directives are inherited from the previous level if and only if
                # there are no header directives defined on the current level.  So if any are added
                # again, these should usually be included again.  Also note that none of these
                # headers are needed in the port 80 server, and one of them
                # (Strict-Transport-Security) MUST NOT be sent over http.
                include nginx-headers.conf;

		# Automatically set the appropriate MIME type for any files we send from nginx
                include /etc/nginx/mime.types;

                # # Don't specify `index` here, because requests that end with a slash
                # # will automatically get one of these appended to the end, even if
                # # served from a more specific location.  We want the locations to handle
                # # such requests themselves, for example, if index.php should be served
                # # before index.html.
                # index index.html index.xhtml index.php;

		# Refuse connections from misbehaving people and robots
		include nginx-block-hackers.conf;
		include nginx-block-robots.conf;

                # Instead of the basic nginx 404 (Not found) page, which is a plain
                # old-timey HTML page with no styling, we will return "419"s in this file.
                # The actual code returned to the browser will still be 404, but the page
                # content will be joomla's 404 page.  This not only makes things more
                # consistent-looking, but also ensures that anything we refuse to serve
                # looks just like it doesn't exist.
                error_page 419 =404 @joomla_404;

                # Case-sensitive http user-agent blocking
                if ($http_user_agent ~* (baidu|ahrefs) ) {
                        return 419;
                }

                # This is also known as 419 because of the error_page directive above.  We
                # construct a page that surely will not exist, so that joomla itself will
                # return the 404.  Since it's a rewrite, rather than a redirect, the
                # browser never knows that any funny business happened.  And since it's
                # not a return, this goes back through nginx processing, so that it gets
                # handled just as if the browser actually requested it.
                location @joomla_404 { rewrite ^ /does_not_exist_DRa6hSunrCnAltzx.html last; }

                # One of the few static files we serve:
                location = /favicon.ico { try_files /favicon.ico =419; }

                # Ask robots to ignore our waveform repository.  Many don't listen.
                location = /robots.txt { try_files /robots.txt =419; }

                # Return the string `healthy` if asked
                location = /health_check { return 200 healthy; }

                location /oauth2/ {
                        include uwsgi_params;
                        uwsgi_param HTTP_HOST                    $host;
                        uwsgi_param HTTP_X_Real_IP               $remote_addr;
                        uwsgi_param HTTP_X_Scheme                $scheme;
                        uwsgi_param HTTP_X_Auth_Request_Redirect $request_uri;
                        uwsgi_pass uwsgi://oauth2:8080;
                        proxy_cookie_path / "/; secure;";
                }

                location /private {
                        auth_request /oauth2/check_authorization;
                        error_page 403 = /oauth2/authorize_github;

                        # pass information via X-User and X-Email headers to backend
                        auth_request_set $user         $upstream_http_x_auth_request_user;
                        auth_request_set $email        $upstream_http_x_auth_request_email;
                        auth_request_set $memberships  $upstream_http_x_auth_request_memberships;
                        proxy_set_header X-User        $user;
                        proxy_set_header X-Email       $email;
                        proxy_set_header X-Memberships $memberships;

                        # if you enabled --cookie-refresh, this is needed for it to work with auth_request
                        auth_request_set $auth_cookie $upstream_http_set_cookie;
                        add_header Set-Cookie $auth_cookie;

                        resolver 127.0.0.11;
                        proxy_pass http://responder:8080;
                        # or "root /path/to/site;" or "fastcgi_pass ..." etc
                        # return 200 healthy;
                }


                # Instead of the basic nginx 401 (Forbidden) page, which is a plain
                # old-timey HTML page with no styling, we will return the login page,
                # which should suggest (1) going back, (2) going home, or (3) trying
                # again.  By making it a location, rather than just an error page, we can
                # place a limit on the frequency of requests that arrive there, and ensure
                # that it is only reachable by explicit calling from nginx but not user
                # requests.
                location @login {
                        limit_req zone=limit_logins burst=5 nodelay;
                        try_files /login.html =401;
                }

                # By splitting this location up into two parts, we can ensure that 401 is
                # always returned, which *should* ensure that browsers drop the
                # credentials.
                location = /logout.html {
                        error_page 401 @logout;
                        return 401;
                }
                location @logout {
                        # If the file isn't found, just fall back on plain 401
                        try_files /logout.html =401;
                }

                # Deny the existence of any hidden files, such as .htaccess or .git, but
                # note that /.well-known needs to be accessible if letsencrypt is being
                # used, so that rule should come before this one.
                location ~ /\. { return 419; }

                # Deny the existence of several joomla parts
                location /administrator { return 419; }
                location /cli { return 419; }
                location /includes { return 419; }
                location /language { return 419; }
                location /logs { return 419; }
                # # We can't deny the existence of these parts, because they're needed for
                # # basic functionality.
                # location /components { return 419; }
                # location /cache { return 419; }
                # location /libraries { return 419; }
                # location /modules { return 419; }
                # location /plugins { return 419; }

                # Organize some old links we need to keep around
                location /SpEC.html { return 301 https://$host/code/SpEC.html; }
                location /spec-resources { return 301 https://$host/code$request_uri; }
                location /SpinWeightedSphericalHarmonics.nb { return 301 https://$host/code/SpinWeightedSphericalHarmonics.nb; }
                location /code { try_files $uri $uri.html $uri/index.html =419; }
                location = /waveforms/catalog.php { return 301 https://$host/data/waveforms/catalog.html; }
                location = /waveforms { return 301 https://$host/data/waveforms/index.html; }
                location ~ ^/waveforms { return 301 https://$host/data$request_uri; }
                location ~ ^/surrogates { return 301 http://$host/data$request_uri; }

                # We want to password protect this page, but return 403 without prompting for a
                # password if the Authorization header is not sent with the request.  This allows
                # the waveform catalog's javascript to silently ignore a failed request for the
                # private data.
                # location = /data/waveforms/private_catalog.json {
                location = /wiki/waveforms/private_catalog.json {
                        # set $both "${http_authorization}${cookie_DokuWiki}";
                        # if ($both = "") {
                        if ($http_authorization = "") {
                                return 403;
                        }
                        rewrite ^ /wiki/_media/website/data/waveforms/catalog.json last;
                }

		# Other requests for /data will get handled here
                include nginx-data.conf;

                # Intercept the "Member Login" button at the bottom of each joomla page, and just go to the wiki
                location /about-us/sxs-members-login { return 301 https://$host/wiki/; }

                # Intercept the "Contact Us" link, to use our recaptcha 
                location /contact-us  {
                        try_files /contact-us.html =404;
                }

                # Redirect requests for selected web apps through authorization.  The part
                # after `~` is a case-sensitive regex, where `?<app>` saves the match
                # result in the variable `$app`.
		location ~ ^/(?<app>wiki|spec-bugs|doxygen2|doxygen|joomla_readwrite) {
                        # Use HTTP Basic Authentication.  Since doxygen needs to
                        # distinguish between groups, we have to use its
                        # conf/users.auth.php file (seen here as .htpasswd through the
                        # magic of docker).  By doing the authentication here in nginx, we
                        # ensure that no requests ever get to any of the dockers this is
                        # protecting unless the user is logged in.  This could potentially
                        # prevent hacking if the protected apps are vulnerable.
                        auth_basic "SXS users";
                        auth_basic_user_file /etc/nginx/.htpasswd;

                        # If a request to these apps is unauthorized (after the browser
                        # has offered the login dropdown), the user should be sent our
                        # special login location.
                        error_page 401 @login;

                        # Note: An explicit resolver is necessary when using proxy_pass
                        # with a variable, as we do in this section.  127.0.0.11 is
                        # docker's built-in DNS resolver as of docker 1.10, and apparently
                        # will not change any time soon.  If this does become a problem,
                        # however, there's an interesting solution suggested at
                        # http://stackoverflow.com/a/37656784/1194883
                        resolver 127.0.0.11;

                        # Forward the request to another container in this docker network.
			proxy_pass http://$app;

                        # Make sure that cookies set by these apps for path `/` get
                        # translated correctly.  Note that trac figures out that it's not
                        # supposed to be on `/`, so we can't just rewrite everything.  But
                        # dokuwiki thinks it should be on `/`, so we need to do something.
                        proxy_cookie_path ~*^/$ /$app;

                        # In case there are any Location or Refresh headers sent back like
                        # http://wiki/, we want them rewritten appropriately.  The default
                        # does not work when there is a variable in `proxy_pass`.
                        proxy_redirect http://$app https://$host;

                        # If the proxies generate errors, intercept them and deal with them using
                        # nginx.  This helps hide the infrastructure behind nginx.
                        proxy_intercept_errors on;
                }

                location /explore/faq  {
                        client_max_body_size 2k;
                        error_page 420 = @joomla;
                        return 420;
                }

                location / {
		        # Default location; everything that hasn't been caught yet goes here!

                        # This line ensures that only very small searches (150 bytes) can
                        # be done.  We have exceptions for the FAQ and contact forms
                        # above, which means that a search from those pages could still be
                        # larger than this, but that's the best we can do.
                        client_max_body_size 150;
                        error_page 420 = @joomla;
                        return 420;
                }

		location @joomla {
                        # Don't forward authorization credentials.  This ensures that we're not
                        # sending the barely obfuscated username and password to our least secure
                        # web app.
                        proxy_set_header Authorization "No";

                        # # Use caching for joomla, to speed things up
                        # proxy_cache joomlacache;

                        include nginx-headers.conf;

                        # Unfortunately, search on each page starts as a POST, then gets
                        # translated to a GET by PHP via redirect, so we have no option
                        # but to allow POST everywhere.
                        limit_except GET POST OPTIONS { deny all; }

                        # Finally, pass whatever hasn't been handled yet to joomla.
                        proxy_pass http://joomla;
		}

	}

	server {
	        listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name data.black-holes.org;
                include nginx-ssl.conf;
		ssl_certificate /etc/ssl/private/live/data.black-holes.org/fullchain.pem;
		ssl_certificate_key /etc/ssl/private/live/data.black-holes.org/privkey.pem;
		ssl_trusted_certificate /etc/ssl/private/live/data.black-holes.org/chain.pem;
                include nginx-headers.conf;

		# Refuse connections from misbehaving people and robots
		include nginx-block-hackers.conf;
		include nginx-block-robots.conf;

                # Case-sensitive http user-agent blocking
                if ($http_user_agent ~* (baidu|ahrefs) ) {
                        return 403;
                }

		# Other requests for /data will get handled here
                include nginx-data.conf;

                location / { return 200 "data.black-holes.org is listening.  Your request URI was '${request_uri}'." ; }
        }

}
